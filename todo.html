<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Todo - 待办事项</title>
<style>
  :root {
    --primary: #6c5ce7;
    --primary-light: #a29bfe;
    --danger: #e17055;
    --success: #00b894;
    --bg: #f0f0f5;
    --card: #ffffff;
    --text: #2d3436;
    --text-light: #636e72;
    --border: #e0e0e0;
    --hover: #f8f7ff;
    --shadow: 0 4px 20px rgba(0,0,0,0.08);
    --radius: 16px;
    --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 40px 20px;
  }

  .app {
    width: 100%;
    max-width: 500px;
    background: var(--card);
    border-radius: var(--radius);
    box-shadow: var(--shadow), 0 20px 60px rgba(0,0,0,0.15);
    overflow: hidden;
    animation: fadeInUp 0.4s ease;
  }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Header */
  .header {
    background: linear-gradient(135deg, var(--primary), #5a4fcf);
    padding: 28px 28px 24px;
    color: #fff;
  }

  .header h1 {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }

  .header .subtitle {
    font-size: 13px;
    opacity: 0.75;
    margin-top: 4px;
  }

  /* Input */
  .input-wrap {
    display: flex;
    gap: 10px;
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
  }

  .input-wrap input {
    flex: 1;
    padding: 12px 16px;
    border: 2px solid var(--border);
    border-radius: 12px;
    font-size: 15px;
    outline: none;
    transition: var(--transition);
    background: var(--bg);
  }

  .input-wrap input:focus {
    border-color: var(--primary-light);
    background: #fff;
    box-shadow: 0 0 0 3px rgba(108, 92, 231, 0.12);
  }

  .input-wrap button {
    padding: 12px 20px;
    background: var(--primary);
    color: #fff;
    border: none;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: var(--transition);
    white-space: nowrap;
  }

  .input-wrap button:hover { background: #5a4fcf; transform: translateY(-1px); }
  .input-wrap button:active { transform: scale(0.96); }

  /* List */
  .list {
    list-style: none;
    min-height: 120px;
    max-height: 420px;
    overflow-y: auto;
  }

  .list::-webkit-scrollbar { width: 4px; }
  .list::-webkit-scrollbar-thumb { background: #ddd; border-radius: 4px; }

  /* Todo item */
  .todo-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 24px;
    border-bottom: 1px solid #f0f0f0;
    cursor: grab;
    transition: var(--transition);
    animation: slideIn 0.3s ease;
  }

  .todo-item:active { cursor: grabbing; }
  .todo-item:hover { background: var(--hover); }
  .todo-item.dragging { opacity: 0.4; background: #f0eeff; }
  .todo-item.drag-over { border-top: 2px solid var(--primary); }

  @keyframes slideIn {
    from { opacity: 0; transform: translateX(-16px); }
    to   { opacity: 1; transform: translateX(0); }
  }

  @keyframes slideOut {
    from { opacity: 1; transform: translateX(0); max-height: 60px; }
    to   { opacity: 0; transform: translateX(40px); max-height: 0; padding: 0; margin: 0; }
  }

  .todo-item.removing {
    animation: slideOut 0.35s ease forwards;
    overflow: hidden;
  }

  /* Custom checkbox */
  .todo-item .checkbox {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    border: 2px solid #d0d0d0;
    flex-shrink: 0;
    cursor: pointer;
    transition: var(--transition);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .todo-item .checkbox:hover { border-color: var(--primary-light); }
  .todo-item .checkbox.checked {
    background: var(--success);
    border-color: var(--success);
  }

  .todo-item .checkbox.checked::after {
    content: '✓';
    color: #fff;
    font-size: 12px;
    font-weight: 700;
  }

  /* Text */
  .todo-item .text-wrap {
    flex: 1;
    min-width: 0;
  }

  .todo-item .text {
    font-size: 15px;
    color: var(--text);
    word-break: break-word;
    transition: var(--transition);
  }

  .todo-item .time {
    font-size: 11px;
    color: var(--text-light);
    margin-top: 2px;
  }

  .todo-item.completed .text {
    color: #b2bec3;
    text-decoration: line-through;
  }

  /* Edit input */
  .todo-item .edit-input {
    flex: 1;
    padding: 6px 10px;
    border: 2px solid var(--primary-light);
    border-radius: 8px;
    font-size: 15px;
    outline: none;
    background: #fff;
    box-shadow: 0 0 0 3px rgba(108, 92, 231, 0.12);
  }

  /* Delete button */
  .todo-item .delete-btn {
    width: 28px;
    height: 28px;
    border: none;
    background: transparent;
    color: #b2bec3;
    font-size: 18px;
    cursor: pointer;
    border-radius: 8px;
    transition: var(--transition);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
  }

  .todo-item:hover .delete-btn { opacity: 1; }
  .todo-item .delete-btn:hover { background: #ffeaea; color: var(--danger); }

  /* Footer */
  .footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 24px;
    border-top: 1px solid var(--border);
    font-size: 13px;
    color: var(--text-light);
    flex-wrap: wrap;
    gap: 10px;
  }

  .footer .count {
    font-weight: 600;
    color: var(--text);
  }

  .footer .filters {
    display: flex;
    gap: 4px;
  }

  .footer .filters button {
    padding: 6px 14px;
    border: none;
    background: transparent;
    border-radius: 20px;
    font-size: 13px;
    cursor: pointer;
    transition: var(--transition);
    color: var(--text-light);
  }

  .footer .filters button.active {
    background: var(--primary);
    color: #fff;
    font-weight: 600;
  }

  .footer .filters button:hover:not(.active) {
    background: #f0f0f5;
  }

  .footer .clear-btn {
    padding: 6px 14px;
    border: none;
    background: transparent;
    color: var(--text-light);
    font-size: 13px;
    cursor: pointer;
    border-radius: 20px;
    transition: var(--transition);
  }

  .footer .clear-btn:hover {
    background: #ffeaea;
    color: var(--danger);
  }

  /* Empty state */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 50px 20px;
    color: #ccc;
    text-align: center;
  }

  .empty-state .icon {
    font-size: 56px;
    margin-bottom: 12px;
    opacity: 0.5;
  }

  .empty-state .msg {
    font-size: 15px;
    color: #b2bec3;
  }

  /* Responsive */
  @media (max-width: 520px) {
    body { padding: 20px 10px; }
    .header { padding: 20px 20px 18px; }
    .header h1 { font-size: 24px; }
    .input-wrap { padding: 16px 16px; gap: 8px; }
    .todo-item { padding: 12px 16px; }
    .footer { padding: 12px 16px; font-size: 12px; }
    .footer .filters button { padding: 5px 10px; font-size: 12px; }
  }
</style>
</head>
<body>

<div class="app">
  <div class="header">
    <h1>📋 待办事项</h1>
    <div class="subtitle">保持专注，完成每一个目标</div>
  </div>

  <div class="input-wrap">
    <input type="text" id="todoInput" placeholder="添加一个新的任务..." maxlength="200" autocomplete="off">
    <button id="addBtn">添加</button>
  </div>

  <ul class="list" id="todoList"></ul>

  <div class="empty-state" id="emptyState">
    <div class="icon">📝</div>
    <div class="msg">还没有任务，开始添加吧</div>
  </div>

  <div class="footer" id="footer" style="display:none;">
    <span class="count" id="countText">0 项待完成</span>
    <div class="filters">
      <button class="active" data-filter="all">全部</button>
      <button data-filter="active">未完成</button>
      <button data-filter="completed">已完成</button>
    </div>
    <button class="clear-btn" id="clearCompleted">清除已完成</button>
  </div>
</div>

<script>
(function() {
  // ── State ──────────────────────────────────
  const STORAGE_KEY = 'todo_app_data';
  let todos = [];
  let currentFilter = 'all';
  let dragSrc = null;

  // ── DOM refs ───────────────────────────────
  const $input   = document.getElementById('todoInput');
  const $addBtn  = document.getElementById('addBtn');
  const $list    = document.getElementById('todoList');
  const $empty   = document.getElementById('emptyState');
  const $footer  = document.getElementById('footer');
  const $count   = document.getElementById('countText');
  const $clear   = document.getElementById('clearCompleted');
  const $filters = document.querySelectorAll('.filters button');

  // ── Persistence ────────────────────────────
  function save() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(todos));
  }

  function load() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) todos = JSON.parse(raw);
    } catch (e) {
      todos = [];
    }
  }

  // ── ID generator ───────────────────────────
  function uid() {
    return Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
  }

  // ── Format time ────────────────────────────
  function formatTime(iso) {
    const d = new Date(iso);
    const pad = n => String(n).padStart(2, '0');
    return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
  }

  // ── Filtered data ──────────────────────────
  function filteredTodos() {
    if (currentFilter === 'active')    return todos.filter(t => !t.completed);
    if (currentFilter === 'completed') return todos.filter(t => t.completed);
    return todos;
  }

  // ── Render ─────────────────────────────────
  function render() {
    const items = filteredTodos();
    $list.innerHTML = '';

    if (items.length === 0) {
      $empty.style.display = 'flex';
    } else {
      $empty.style.display = 'none';
    }

    items.forEach(todo => {
      const li = document.createElement('li');
      li.className = 'todo-item' + (todo.completed ? ' completed' : '');
      li.draggable = true;
      li.dataset.id = todo.id;
      li.dataset.index = todos.indexOf(todo);

      // Checkbox
      const check = document.createElement('span');
      check.className = 'checkbox' + (todo.completed ? ' checked' : '');
      check.addEventListener('click', () => toggleTodo(todo.id));

      // Text area
      const wrap = document.createElement('div');
      wrap.className = 'text-wrap';

      const text = document.createElement('div');
      text.className = 'text';
      text.textContent = todo.text;

      const time = document.createElement('div');
      time.className = 'time';
      time.textContent = '创建于 ' + formatTime(todo.createdAt);

      wrap.appendChild(text);
      wrap.appendChild(time);

      // Double-click edit
      wrap.addEventListener('dblclick', () => enterEdit(li, todo));

      // Delete button
      const delBtn = document.createElement('button');
      delBtn.className = 'delete-btn';
      delBtn.innerHTML = '&times;';
      delBtn.title = '删除';
      delBtn.addEventListener('click', e => {
        e.stopPropagation();
        deleteTodo(todo.id, li);
      });

      // Drag events
      li.addEventListener('dragstart', e => onDragStart(e, todo));
      li.addEventListener('dragover',  e => onDragOver(e));
      li.addEventListener('dragleave', e => { e.target.closest('.todo-item')?.classList.remove('drag-over'); });
      li.addEventListener('drop',      e => onDrop(e, todo));
      li.addEventListener('dragend',   e => { document.querySelectorAll('.todo-item.dragging').forEach(el => el.classList.remove('dragging')); });

      li.appendChild(check);
      li.appendChild(wrap);
      li.appendChild(delBtn);
      $list.appendChild(li);
    });

    updateFooter();
  }

  function updateFooter() {
    const activeCount = todos.filter(t => !t.completed).length;
    const doneCount   = todos.filter(t => t.completed).length;

    $count.textContent = activeCount + ' 项待完成';

    if (todos.length === 0) {
      $footer.style.display = 'none';
    } else {
      $footer.style.display = 'flex';
    }

    // Update clear button visibility
    $clear.style.visibility = doneCount > 0 ? 'visible' : 'hidden';

    // Update filter buttons
    $filters.forEach(btn => {
      btn.classList.toggle('active', btn.dataset.filter === currentFilter);
    });
  }

  // ── Actions ────────────────────────────────
  function addTodo() {
    const text = $input.value.trim();
    if (!text) return;

    todos.unshift({
      id: uid(),
      text: text,
      completed: false,
      createdAt: new Date().toISOString()
    });

    $input.value = '';
    $input.focus();
    save();
    render();
  }

  function toggleTodo(id) {
    const todo = todos.find(t => t.id === id);
    if (todo) {
      todo.completed = !todo.completed;
      save();
      render();
    }
  }

  function deleteTodo(id, li) {
    if (li) {
      li.classList.add('removing');
      li.addEventListener('animationend', () => {
        todos = todos.filter(t => t.id !== id);
        save();
        render();
      }, { once: true });
    } else {
      todos = todos.filter(t => t.id !== id);
      save();
      render();
    }
  }

  function clearCompleted() {
    todos = todos.filter(t => !t.completed);
    save();
    render();
    if (currentFilter === 'completed') currentFilter = 'all';
  }

  function setFilter(filter) {
    currentFilter = filter;
    $filters.forEach(btn => btn.classList.toggle('active', btn.dataset.filter === filter));
    render();
  }

  // ── Edit ───────────────────────────────────
  function enterEdit(li, todo) {
    const wrap = li.querySelector('.text-wrap');
    const input = document.createElement('input');
    input.type = 'text';
    input.className = 'edit-input';
    input.value = todo.text;
    input.maxLength = 200;

    wrap.replaceWith(input);
    input.focus();
    input.select();

    function saveEdit() {
      const newText = input.value.trim();
      if (newText && newText !== todo.text) {
        todo.text = newText;
        save();
      }
      render();
    }

    input.addEventListener('blur', saveEdit);
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') { input.blur(); }
      if (e.key === 'Escape') { input.value = todo.text; input.blur(); }
    });
  }

  // ── Drag & Drop ────────────────────────────
  function onDragStart(e, todo) {
    dragSrc = todo;
    e.target.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', '');
  }

  function onDragOver(e) {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    const li = e.target.closest('.todo-item');
    if (li) {
      document.querySelectorAll('.todo-item.drag-over').forEach(el => el.classList.remove('drag-over'));
      li.classList.add('drag-over');
    }
  }

  function onDrop(e, targetTodo) {
    e.preventDefault();
    document.querySelectorAll('.todo-item.drag-over').forEach(el => el.classList.remove('drag-over'));

    if (!dragSrc || dragSrc.id === targetTodo.id) return;

    const fromIdx = todos.findIndex(t => t.id === dragSrc.id);
    const toIdx   = todos.findIndex(t => t.id === targetTodo.id);

    if (fromIdx !== -1 && toIdx !== -1) {
      const [moved] = todos.splice(fromIdx, 1);
      todos.splice(toIdx, 0, moved);
      save();
      render();
    }
    dragSrc = null;
  }

  // ── Event bindings ─────────────────────────
  $addBtn.addEventListener('click', addTodo);
  $input.addEventListener('keydown', e => {
    if (e.key === 'Enter') addTodo();
  });

  $clear.addEventListener('click', clearCompleted);

  $filters.forEach(btn => {
    btn.addEventListener('click', () => setFilter(btn.dataset.filter));
  });

  // ── Init ───────────────────────────────────
  load();
  render();
  $input.focus();

})();
</script>

</body>
</html>
